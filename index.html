<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Me — Career Discovery</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .app {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      height: 92vh;
      max-height: 800px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f0f0ee;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: #1a1a1a; letter-spacing: -0.5px; }
    .logo span { font-style: italic; color: #1D9E75; }
    .tagline { font-size: 11px; color: #aaa; font-weight: 300; letter-spacing: 0.06em; text-transform: uppercase; }

    .chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.agent { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 300;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user { background: #1D9E75; color: #fff; border-radius: 18px 18px 4px 18px; }
    .bubble.agent { background: #f7f7f5; color: #1a1a1a; border-radius: 18px 18px 18px 4px; border: 1px solid #ebebea; }

    .suggestions-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0 4px 2px;
    }

    .suggestion-chip {
      background: #fff;
      border: 1px solid #1D9E75;
      color: #1D9E75;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .suggestion-chip:hover { background: #1D9E75; color: #fff; }
    .suggestion-chip:active { transform: scale(0.97); }
    .suggestion-chip.used { opacity: 0.4; pointer-events: none; }

    .careers-wrap { width: 100%; display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
