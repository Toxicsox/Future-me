<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Me — Career Discovery</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .app {
      background: #ffffff;
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      height: 92vh;
      max-height: 760px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f0f0ee;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .logo span { font-style: italic; color: #1D9E75; }

    .tagline {
      font-size: 11px;
      color: #aaa;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.agent { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 300;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: #1D9E75;
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }

    .bubble.agent {
      background: #f7f7f5;
      color: #1a1a1a;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #ebebea;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: #f7f7f5;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #ebebea;
      width: fit-content;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1D9E75;
      opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #f0f0ee;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea {
      flex: 1; resize: none;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      border-radius: 12px;
      border: 1px solid #e0e0de;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #1D9E75; }

    button.send {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      background: #1D9E75;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    button.send:hover { opacity: 0.88; }
    button.send:active { transform: scale(0.95); }
    button.send:disabled { opacity: 0.35; cursor: default; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      font-weight: 300;
    }

    button.restart {
      background: none; border: none;
      font-size: 11px; color: #bbb;
      cursor: pointer; text-decoration: underline;
      font-family: 'DM Sans', sans-serif;
      margin-top: 4px;
    }
    button.restart:hover { color: #888; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Future<span>Me</span></div>
    <div class="tagline">Career Discovery</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" rows="2" placeholder="Type your reply..."></textarea>
      <button class="send" id="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer">
      Your answers are private and never saved
      <br><button class="restart" onclick="restartChat()">Start over</button>
    </div>
  </div>
</div>

<script>
  let history = [];

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap agent';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function callServer(userMessage) {
    if (userMessage) history.push({ role: 'user', content: userMessage });
    showTyping();
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const reply = data.content.map(b => b.text || '').join('');
      hideTyping();
      history.push({ role: 'assistant', content: reply });
      addMessage('agent', reply);
    } catch (e) {
      hideTyping();
      addMessage('agent', 'Something went wrong — please refresh and try again.');
    }
    document.getElementById('send-btn').disabled = false;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage('user', text);
    await callServer(text);
  }

  function restartChat() {
    history = [];
    document.getElementById('messages').innerHTML = '';
    callServer(null);
  }

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  callServer(null);
</script>
</body>
</html>
