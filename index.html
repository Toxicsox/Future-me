<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Me — Career Discovery</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .app {
      background: #ffffff;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      height: 92vh;
      max-height: 800px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f0f0ee;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }
    .logo span { font-style: italic; color: #1D9E75; }

    .tagline {
      font-size: 11px;
      color: #aaa;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: opacity 0.25s ease;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.agent { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 300;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: #1D9E75;
      color: #fff;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble.agent {
      background: #f7f7f5;
      color: #1a1a1a;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #ebebea;
    }

    .careers-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 4px 0;
    }

    .careers-intro {
      font-size: 14px;
      font-weight: 300;
      color: #1a1a1a;
      line-height: 1.65;
      padding: 12px 16px;
      background: #f7f7f5;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #ebebea;
      margin-bottom: 4px;
    }

    .career-card {
      background: #ffffff;
      border: 1px solid #ebebea;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: cardIn 0.35s ease forwards;
      opacity: 0;
    }
    .career-card:active { transform: scale(0.98); }
    .career-card:hover { box-shadow: 0 4px 16px rgba(29,158,117,0.15); }

    .career-card-header {
      background: #1D9E75;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .career-title {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    .career-emoji { font-size: 20px; }

    .career-card-body {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .career-row { display: flex; flex-direction: column; gap: 2px; }

    .career-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1D9E75;
    }

    .career-value {
      font-size: 13px;
      font-weight: 300;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .career-divider { height: 1px; background: #f0f0ee; margin: 2px 0; }

    .next-step-row {
      background: #f0faf6;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .next-step-row .career-label { color: #0F6E56; }
    .next-step-row .career-value { color: #0F6E56; font-weight: 400; }

    .tap-hint {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      font-weight: 300;
      padding: 6px 0 2px;
    }

    .detail-view {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ffffff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }

    .detail-view.visible { transform: translateX(0); }

    .detail-header {
      background: #1D9E75;
      padding: 20px 20px 18px;
      flex-shrink: 0;
    }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      padding: 0;
      margin-bottom: 12px;
    }
    .detail-back:hover { color: #fff; }

    .detail-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .detail-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 300;
      margin-top: 4px;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .detail-section {
      background: #f7f7f5;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-section-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1D9E75;
      margin-bottom: 2px;
    }

    .detail-section-content {
      font-size: 14px;
      font-weight: 300;
      color: #1a1a1a;
      line-height: 1.7;
    }

    .detail-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      color: #aaa;
      font-size: 14px;
      font-weight: 300;
    }

    .detail-dots { display: flex; gap: 6px; }

    .detail-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1D9E75;
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .detail-dot:nth-child(2) { animation-delay: 0.2s; }
    .detail-dot:nth-child(3) { animation-delay: 0.4s; }

    .typing {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 16px;
      background: #f7f7f5;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #ebebea;
      width: fit-content;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #1D9E75; opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #f0f0ee;
      display: flex; flex-direction: column; gap: 8px;
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea {
      flex: 1; resize: none;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      border-radius: 12px;
      border: 1px solid #e0e0de;
      background: #fff; color: #1a1a1a;
      line-height: 1.5; outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #1D9E75; }

    button.send {
      width: 44px; height: 44px; border-radius: 12px;
      border: none; background: #1D9E75; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
    }
    button.send:hover { opacity: 0.88; }
    button.send:active { transform: scale(0.95); }
    button.send:disabled { opacity: 0.35; cursor: default; }

    .footer {
      text-align: center; font-size: 11px;
      color: #bbb; font-weight: 300;
    }
    button.restart {
      background: none; border: none;
      font-size: 11px; color: #bbb;
      cursor: pointer; text-decoration: underline;
      font-family: 'DM Sans', sans-serif; margin-top: 4px;
    }
    button.restart:hover { color: #888; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header" id="main-header">
    <div class="logo">Future<span>Me</span></div>
    <div class="tagline">Career Discovery</div>
  </div>

  <div class="chat-view" id="chat-view">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" rows="2" placeholder="Type your reply..."></textarea>
        <button class="send" id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="footer">
        Your answers are private and never saved
        <br><button class="restart" onclick="restartChat()">Start over</button>
      </div>
    </div>
  </div>

  <div class="detail-view" id="detail-view">
    <div class="detail-header" id="detail-header">
      <button class="detail-back" onclick="closeDetail()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to results
      </button>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-subtitle" id="detail-subtitle"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

</div>

<script>
  let history = [];
  let conversationSummary = '';
  const cardEmojis = ['💡', '🎯', '🚀', '⭐'];

  function parseCareerText(text) {
    if (!text.includes('CAREERS_START')) return null;
    const introMatch = text.split('CAREERS_START')[0].trim();
    const careerBlock = text.split('CAREERS_START')[1].split('CAREERS_END')[0];
    const careers = [];
    for (let i = 1; i <= 4; i++) {
      const get = (key) => {
        const regex = new RegExp(`CAREER_${i}_${key}:\\s*(.+)`);
        const match = careerBlock.match(regex);
        return match ? match[1].trim() : '';
      };
      const title = get('TITLE');
      if (!title) continue;
      careers.push({ title, why: get('WHY'), salary: get('SALARY'), subjects: get('SUBJECTS'), nextstep: get('NEXTSTEP') });
    }
    return { intro: introMatch, careers };
  }

  function renderCareerCards(parsed) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap agent';
    const container = document.createElement('div');
    container.className = 'careers-wrap';

    if (parsed.intro) {
      const intro = document.createElement('div');
      intro.className = 'careers-intro';
      intro.textContent = parsed.intro;
      container.appendChild(intro);
      conversationSummary = parsed.intro;
    }

    parsed.careers.forEach((career, i) => {
      const card = document.createElement('div');
      card.className = 'career-card';
      card.style.animationDelay = `${i * 0.1}s`;
      card.onclick = () => openDetail(career);
      card.innerHTML = `
        <div class="career-card-header">
          <div class="career-title">${career.title}</div>
          <div class="career-emoji">${cardEmojis[i] || '✨'}</div>
        </div>
        <div class="career-card-body">
          <div class="career-row">
            <div class="career-label">Why it suits you</div>
            <div class="career-value">${career.why}</div>
          </div>
          <div class="career-divider"></div>
          <div class="career-row">
            <div class="career-label">Salary range (NZD)</div>
            <div class="career-value">${career.salary}</div>
          </div>
          <div class="career-divider"></div>
          <div class="career-row">
            <div class="career-label">Helpful subjects</div>
            <div class="career-value">${career.subjects}</div>
          </div>
          <div class="career-divider"></div>
          <div class="next-step-row">
            <div class="career-label">Your next step</div>
            <div class="career-value">${career.nextstep}</div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });

    const hint = document.createElement('div');
    hint.className = 'tap-hint';
    hint.textContent = 'Tap any card to explore that career in detail';
    container.appendChild(hint);

    wrap.appendChild(container);
    return wrap;
  }

  async function openDetail(career) {
    const detailView = document.getElementById('detail-view');
    const detailTitle = document.getElementById('detail-title');
    const detailSubtitle = document.getElementById('detail-subtitle');
    const detailBody = document.getElementById('detail-body');

    detailTitle.textContent = career.title;
    detailSubtitle.textContent = career.why;
    detailBody.innerHTML = `
      <div class="detail-loading">
        <div class="detail-dots">
          <div class="detail-dot"></div>
          <div class="detail-dot"></div>
          <div class="detail-dot"></div>
        </div>
        <div>Building your career profile...</div>
      </div>
    `;

    detailView.classList.add('visible');

    try {
      const prompt = `A teenager has just completed a career discovery conversation. Here is what we learned about them: "${conversationSummary}"

Based on this, please provide a detailed profile for the career: ${career.title}

Return ONLY this exact format with no extra text:

DAY_IN_LIFE: [A vivid 3-4 sentence description of what a typical day looks like in this role, written directly to the teenager in second person]

QUALIFICATIONS: [The specific qualifications, degrees or certifications needed in New Zealand, listed clearly]

PATHWAY: [A clear step by step pathway from where they are now in school through to landing this role, written as numbered steps]

NZ_INSTITUTIONS: [3-5 specific New Zealand universities, polytechnics or institutes that offer relevant courses for this career, with the course name next to each]`;

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      const reply = data.content.map(b => b.text || '').join('');

      const get = (key) => {
        const regex = new RegExp(`${key}:\\s*([\\s\\S]*?)(?=\\n[A-Z_]+:|$)`);
        const match = reply.match(regex);
        return match ? match[1].trim() : '';
      };

      detailBody.innerHTML = `
        <div class="detail-section">
          <div class="detail-section-label">A day in the life</div>
          <div class="detail-section-content">${get('DAY_IN_LIFE')}</div>
        </div>
        <div class="detail-section">
          <div class="detail-section-label">Qualifications required</div>
          <div class="detail-section-content">${get('QUALIFICATIONS')}</div>
        </div>
        <div class="detail-section">
          <div class="detail-section-label">Your pathway to get there</div>
          <div class="detail-section-content">${get('PATHWAY')}</div>
        </div>
        <div class="detail-section">
          <div class="detail-section-label">New Zealand universities and colleges</div>
          <div class="detail-section-content">${get('NZ_INSTITUTIONS')}</div>
        </div>
      `;

    } catch(e) {
      detailBody.innerHTML = `<div class="detail-loading">Something went wrong loading this career. Please go back and try again.</div>`;
    }
  }

  function closeDetail() {
    document.getElementById('detail-view').classList.remove('visible');
  }

  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    if (role === 'agent') {
      const parsed = parseCareerText(text);
      if (parsed && parsed.careers.length > 0) {
        msgs.appendChild(renderCareerCards(parsed));
        msgs.scrollTop = msgs.scrollHeight;
        return;
      }
    }
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap agent';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function callServer(userMessage) {
    if (userMessage) history.push({ role: 'user', content: userMessage });
    showTyping();
    document.getElementById('send-btn').disabled = true;
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const reply = data.content.map(b => b.text || '').join('');
      hideTyping();
      history.push({ role: 'assistant', content: reply });
      addMessage('agent', reply);
    } catch(e) {
      hideTyping();
      addMessage('agent', 'Something went wrong — please refresh and try again.');
    }
    document.getElementById('send-btn').disabled = false;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage('user', text);
    await callServer(text);
  }

  function restartChat() {
    history = [];
    conversationSummary = '';
    document.getElementById('messages').innerHTML = '';
    document.getElementById('detail-view').classList.remove('visible');
    callServer(null);
  }

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  callServer(null);
</script>
</body>
</html>
